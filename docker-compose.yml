services:

  db:
    image: postgres:15

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: quickorder

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    restart: always

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:

    build:
      context: ./backend

    ports:
      - "3001:3001"

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: quickorder

    depends_on:
      db:
        condition: service_healthy

    restart: always

  frontend:

    build:
      context: ./frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

    restart: always

volumes:
  postgres_data: