services:

  db:
    image: postgres:15

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: quickorder

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    restart: always

  backend:
    build: ./backend

    ports:
      - "3001:3001"

    depends_on:
      - db

    restart: always

  frontend:
    build: ./frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

    restart: always

volumes:
  postgres_data: