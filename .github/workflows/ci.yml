name: CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm install
        working-directory: backend

      - name: Executar testes
        run: npm test
        working-directory: backend

      - name: Build Docker
        run: docker compose build