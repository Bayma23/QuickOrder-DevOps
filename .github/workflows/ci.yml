name: CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Backend Install
        working-directory: backend
        run: npm install

      - name: Backend Test
        working-directory: backend
        run: npm test

      - name: Frontend Install
        working-directory: frontend
        run: npm install

      - name: Frontend Build
        working-directory: frontend
        run: npm run build

      - name: Docker Build
        run: docker compose build